<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Entregas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 12px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 { color: #0275d8; margin: 0 0 10px 0; font-size: 22px; display: flex; align-items: center; gap: 8px; }
        
        .busca-box {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 5px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
            font-size: 14px;
        }
        th { background-color: #f8f9fa; color: #495057; font-weight: 600; }
        
        .status-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            display: inline-block;
        }
        .pendente { background-color: #fff3cd; color: #856404; } /* Pendente */
        .em-rota { background-color: #cce5ff; color: #004085; }  /* Em Rota */
        .concluido { background-color: #d4edda; color: #155724; } /* Entregue */

        .btn-whats {
            background-color: #25D366;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 12px;
        }
        .btn-whats:hover { background-color: #1ebd58; }
        
        .btn-edit {
            background-color: #f0ad4e;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        .btn-edit:hover { background-color: #ec971f; }

        .status-conexao {
            padding: 10px;
            background-color: #e2e8f0;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* MODAL DE EDIÇÃO */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .modal-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
        }
        .close-btn {
            cursor: pointer;
            font-size: 20px;
            color: #aaa;
        }
        .close-btn:hover { color: black; }
        
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 13px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .btn-save {
            background-color: #0275d8;
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-save:hover { background-color: #025aa5; }

        .btn-export {
            background-color: #337ab7;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📦 Painel de Controle de Entregas</h1>
    <div id="status" class="status-conexao">🔄 Conectando com o Dropbox...</div>

    <input type="text" id="busca" class="busca-box" placeholder="Filtrar por cliente, motorista, status ou nota fiscal..." onkeyup="filtrarTabela()">

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>Cliente / Endereço</th>
                    <th>Motorista Escalado</th>
                    <th>Pedido / Nota</th>
                    <th>Status da Entrega</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-corpo">
                </tbody>
        </table>
    </div>

    <button class="btn-export" onclick="exportarDadosAtualizados()">💾 Salvar Alterações no Dropbox</button>
</div>

<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span>✏️ Ajustar Detalhes da Entrega</span>
            <span class="close-btn" onclick="fecharModal()">&times;</span>
        </div>
        <input type="hidden" id="edit-index">
        
        <div class="form-group">
            <label>Destinatário</label>
            <input type="text" id="edit-nome" disabled style="background-color: #f1f1f1;">
        </div>
        
        <div class="form-group">
            <label>Motorista Responsável</label>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="edit-motorista" placeholder="Digite o nome do motorista">
                <button type="button" onclick="document.getElementById('edit-motorista').value=''" style="padding:8px; border-radius:6px; cursor:pointer; background:#6c757d; color:white; border:none;">Limpar</button>
            </div>
        </div>

        <div class="form-group">
            <label>Status</label>
            <select id="edit-status">
                <option value="Pendente">Pendente</option>
                <option value="Em rota">Em rota</option>
                <option value="Concluido">Concluido</option>
            </select>
        </div>

        <div class="form-group">
            <label>Pedido / Nota Fiscal</label>
            <input type="text" id="edit-nota">
        </div>

        <button class="btn-save" onclick="salvarAlteracoes()">Confirmar Alterações</button>
    </div>
</div>

<script src="https://www.dropbox.com/scl/fi/zqtsdpf98acxcig89234c/script.js?rlkey=j96xh1y38w15u29augc8sax0t&raw=1"></script>

<script>
    const statusDiv = document.getElementById('status');
    let listaEntregas = [];

    function inicializarPainel() {
        try {
            // Busca as variáveis comuns geradas pelo Java no Dropbox
            const dados = window.cobrancas || window.devedores || window.dados || window.entregas;

            if (!dados || dados.length === 0) {
                throw new Error("Nenhum dado encontrado no arquivo do Dropbox.");
            }

            listaEntregas = dados;

            statusDiv.innerHTML = "🟢 Sincronizado com o Dropbox!";
            statusDiv.style.backgroundColor = "#d4edda";
            statusDiv.style.color = "#155724";

            renderizarTabela(listaEntregas);

        } catch (erro) {
            console.error(erro);
            statusDiv.innerHTML = "🔴 Erro: " + erro.message;
            statusDiv.style.backgroundColor = "#f8d7da";
            statusDiv.style.color = "#721c24";
        }
    }

    function renderizarTabela(dados) {
        const tabela = document.getElementById('tabela-corpo');
        tabela.innerHTML = "";

        dados.forEach((entrega, index) => {
            const nome = entrega.nome || entrega.cliente || "Destinatário Não Informado";
            const motorista = entrega.motorista || "Não Definido";
            const nota = entrega.nota || entrega.valor || "-"; // Se não houver nota, exibe outro valor identificador
            const statusFiltro = (entrega.status || "Pendente").toLowerCase();
            const contato = entrega.contato || entrega.telefone || "";

            let statusClass = "pendente";
            let statusTexto = "Pendente";

            if (statusFiltro.includes("rota") || statusFiltro.includes("caminho")) {
                statusClass = "em-rota";
                statusTexto = "🚚 Em Rota";
            } else if (statusFiltro.includes("concluid") || statusFiltro.includes("entregue")) {
                statusClass = "concluido";
                statusTexto = "✅ Entregue";
            } else {
                statusClass = "pendente";
                statusTexto = "⏳ Pendente";
            }
            
            // Mensagem amigável avisando o cliente sobre o motorista que vai levar a entrega
            const mensagemWhats = encodeURIComponent(`Olá ${nome}, sua entrega (Pedido/Nota: ${nota}) está sendo preparada! O motorista ${motorista} será o responsável pelo transporte. Entraremos em contato assim que ele estiver próximo.`);

            tabela.innerHTML += `
                <tr>
                    <td><strong>${nome}</strong></td>
                    <td><span style="color:#444; font-weight: 500;">👤 ${motorista}</span></td>
                    <td># ${nota}</td>
                    <td><span class="status-badge ${statusClass}">${statusTexto}</span></td>
                    <td>
                        <div style="display:flex; gap: 6px;">
                            <a href="https://wa.me/55${contato.replace(/\D/g, '')}?text=${mensagemWhats}" target="_blank" class="btn-whats">
                                💬 Avisar Cliente
                            </a>
                            <button class="btn-edit" onclick="abrirEdicao(${index})">
                                ✏️ Editar
                            </button>
                        </div>
                    </td>
                </tr>
            `;
        });
    }

    // MODAL DE EDIÇÃO
    function abrirEdicao(index) {
        const entrega = listaEntregas[index];
        document.getElementById('edit-index').value = index;
        document.getElementById('edit-nome').value = entrega.nome || entrega.cliente || "Sem Nome";
        document.getElementById('edit-motorista').value = entrega.motorista || "";
        document.getElementById('edit-nota').value = entrega.nota || entrega.valor || "";
        
        const statusAtual = entrega.status || "Pendente";
        document.getElementById('edit-status').value = statusAtual;
        
        document.getElementById('editModal').style.display = 'flex';
    }

    function fecharModal() {
        document.getElementById('editModal').style.display = 'none';
    }

    function salvarAlteracoes() {
        const index = document.getElementById('edit-index').value;
        if (index !== "") {
            listaEntregas[index].motorista = document.getElementById('edit-motorista').value;
            listaEntregas[index].status = document.getElementById('edit-status').value;
            listaEntregas[index].nota = document.getElementById('edit-nota').value;
            
            renderizarTabela(listaEntregas);
            fecharModal();
            alert("Sucesso: Alterações aplicadas na tela! Lembre-se de salvar os dados no Dropbox para torná-las definitivas.");
        }
    }

    // EXPORTAR DE VOLTA PARA O SCRIPT.JS
    function exportarDadosAtualizados() {
        const codigoFinal = "window.cobrancas = " + JSON.stringify(listaEntregas, null, 2) + ";";
        
        navigator.clipboard.writeText(codigoFinal).then(() => {
            alert("Copiado! O código com o novo motorista foi guardado na memória do seu computador.\n\nAbra o seu arquivo 'script.js' do Dropbox no Bloco de Notas, limpe tudo, cole (Ctrl+V) e salve!");
        }).catch(err => {
            console.log(codigoFinal);
            alert("Erro ao copiar automaticamente. O código foi gerado no console do navegador (F12).");
        });
    }

    function filtrarTabela() {
        let input = document.getElementById('busca').value.toLowerCase();
        let linhas = document.getElementById('tabela-corpo').getElementsByTagName('tr');

        for (let i = 0; i < linhas.length; i++) {
            let textoLinha = linhas[i].innerText.toLowerCase();
            linhas[i].style.display = textoLinha.includes(input) ? "" : "none";
        }
    }

    window.onload = inicializarPainel;
</script>

</body>
</html>
